worker_processes 2;

user nobody nogroup;
pid /tmp/nginx.pid;
error_log /tmp/nginx.error.log;

events {
    worker_connections 1024;
    accept_mutex off;
}

http {
    server_tokens off;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /tmp/nginx.access.log combined;
    sendfile on;

    # アップストリーム（app_server / frontend_server）は envsubst で展開される
    # テンプレート（templates/http.conf.template → conf.d/）側で、環境変数
    # DJANGO_UPSTREAM / FRONTEND_UPSTREAM から定義する。ここでは静的に持たない。
    #
    # Docker embedded DNS for lazy upstream resolution (grafana is optional, see compose profile 'metrics').
    # k3s では cluster DNS（CoreDNS）の ServiceIP に合わせて NGINX_RESOLVER 相当を調整する。
    resolver 127.0.0.11 valid=10s ipv6=off;
    include /etc/nginx/conf.d/*.conf;
}