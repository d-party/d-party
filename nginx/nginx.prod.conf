# 本番用 nginx メイン設定。dev (nginx.conf) とは分離し、TLS 終端を担う。
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml で起動すると
#   nginx はこの設定 (-c /etc/nginx/nginx.prod.conf) で動く。
#
# server ブロック本体は templates-prod/*.template を envsubst で展開した
# conf.prod.d/*.conf を include する（dev の conf.d/ とは別ディレクトリ）。
worker_processes auto;

user nobody nogroup;
pid /tmp/nginx.pid;
error_log /tmp/nginx.error.log;

events {
    worker_connections 1024;
    accept_mutex off;
}

http {
    server_tokens off;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /tmp/nginx.access.log combined;
    sendfile on;

    # アップストリーム（app_server / frontend_server）はテンプレート側で
    # 環境変数 DJANGO_UPSTREAM / FRONTEND_UPSTREAM から定義する。
    # Docker embedded DNS で遅延解決（grafana は metrics profile のときのみ存在）。
    resolver 127.0.0.11 valid=10s ipv6=off;

    include /etc/nginx/conf.prod.d/*.conf;
}
