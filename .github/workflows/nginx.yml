name: nginx

# nginx 設定は envsubst テンプレート（dev: templates/, prod: templates-prod/）で、
# 変数を展開してからでないと nginx -t にかけられない。dev はそのまま、prod は
# TLS 証明書ファイル（letsencrypt）を include するためダミーの自己署名証明書・
# dhparam・空 conf を生成してから検証する。展開先は本番 nginx イメージと同じ
# nginx:1.27-alpine を docker run して構文チェックする。
on:
  pull_request:
    paths:
      - "nginx/**"
      - ".github/workflows/nginx.yml"
  push:
    branches: [main]
    paths:
      - "nginx/**"
      - ".github/workflows/nginx.yml"

# envsubst で展開する変数は明示する（無指定だと $host 等の nginx 変数まで潰れる）。
env:
  MY_DOMAIN: localhost
  DJANGO_UPSTREAM: 127.0.0.1:8000
  FRONTEND_UPSTREAM: 127.0.0.1:3000
  GRAFANA_UPSTREAM: 127.0.0.1:3001
  NGINX_IMAGE: nginx:1.27-alpine

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # prod テンプレートが参照する letsencrypt 一式をダミーで用意する。
      # nginx -t は ssl_certificate / ssl_dhparam を実際に読み込むため、中身が
      # 正しい PEM である必要がある（自己署名 + dhparam を生成する）。
      - name: Prepare dummy TLS assets (prod template)
        run: |
          mkdir -p certs/live/"${MY_DOMAIN}"
          openssl req -x509 -newkey rsa:2048 -nodes -days 1 \
            -keyout certs/live/"${MY_DOMAIN}"/privkey.pem \
            -out certs/live/"${MY_DOMAIN}"/fullchain.pem \
            -subj "/CN=${MY_DOMAIN}"
          openssl dhparam -out certs/ssl-dhparams.pem 2048
          : > certs/options-ssl-nginx.conf

      - name: Validate dev template (templates/http.conf.template)
        run: |
          docker run --rm \
            -e MY_DOMAIN -e DJANGO_UPSTREAM -e FRONTEND_UPSTREAM -e GRAFANA_UPSTREAM \
            -v "$PWD/nginx/templates/http.conf.template:/etc/nginx/templates/default.conf.template:ro" \
            -v "$PWD/nginx/mime.types:/etc/nginx/mime.types:ro" \
            --entrypoint sh "$NGINX_IMAGE" -c '
              envsubst "\$MY_DOMAIN \$DJANGO_UPSTREAM \$FRONTEND_UPSTREAM \$GRAFANA_UPSTREAM" \
                < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf
              nginx -t'

      - name: Validate prod template (templates-prod/default.conf.template)
        run: |
          docker run --rm \
            -e MY_DOMAIN -e DJANGO_UPSTREAM -e FRONTEND_UPSTREAM -e GRAFANA_UPSTREAM \
            -v "$PWD/nginx/templates-prod/default.conf.template:/etc/nginx/templates/default.conf.template:ro" \
            -v "$PWD/nginx/mime.types:/etc/nginx/mime.types:ro" \
            -v "$PWD/certs:/etc/letsencrypt:ro" \
            --entrypoint sh "$NGINX_IMAGE" -c '
              envsubst "\$MY_DOMAIN \$DJANGO_UPSTREAM \$FRONTEND_UPSTREAM \$GRAFANA_UPSTREAM" \
                < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf
              nginx -t'
