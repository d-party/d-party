x-env_file: &env_file ./.env.global

volumes:
  prometheus_data: {}
  grafana_data: {}

services:
  nginx:
    container_name: nginx
    image: nginx:1.27
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "./nginx/:/etc/nginx/"
      - "./backend/static:/static"
      - "./nginx/.well-known:/.well-known"
    depends_on:
      django:
        condition: service_healthy
      frontend:
        condition: service_healthy
    env_file: *env_file
  django:
    container_name: django
    # Pin the built image name so it does not depend on the compose project
    # (checkout-directory) name; dockle/trivy in CI scan `backend-django`.
    image: backend-django
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - 8000:8000
    volumes:
      - ./backend/:/usr/src/app/
      - ./backend/.env.django:/env_files/.env.django
      - ./.env.global:/env_files/.env.global
    command: "sh entrypoint.sh"
    env_file:
      - ./backend/.env.django
      - *env_file
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import socket,sys; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1',8000)); s.close()\""
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
  frontend:
    container_name: frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # ブラウザは nginx と同一オリジン経由でバックエンドへアクセスする。
        # 既定は localhost(dev)。デプロイ時はドメイン・プロトコルを差し替える。
        NEXT_PUBLIC_BACKEND_PROTOCOL: "${FRONTEND_BACKEND_PROTOCOL:-http://}"
        NEXT_PUBLIC_BACKEND_HOST: "${FRONTEND_BACKEND_HOST:-localhost/}"
    expose:
      - "3000"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/ || exit 1"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
  postgres:
    image: postgres:16
    container_name: postgres
    ports:
      - 5432:5432
    volumes:
      - "./postgres/data:/var/lib/postgresql/data"
    env_file:
      - ./postgres/.env.postgres
      - *env_file
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
  adminer:
    image: adminer:4
    container_name: adminer
    ports:
      - 8080:8080
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy
  redis:
    image: redis:7.4
    container_name: redis
    ports:
      - 6379:6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
  prometheus:
    container_name: prometheus
    image: prom/prometheus:v2.55.1
    profiles: ["metrics"]
    volumes:
      - ./prometheus/:/etc/prometheus/
    #      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - 9090:9090
    depends_on:
      django:
        condition: service_healthy
      cadvisor:
        condition: service_started
      node-exporter:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  node-exporter:
    container_name: node-exporter
    image: prom/node-exporter:v1.8.2
    profiles: ["metrics"]
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - --collector.filesystem.ignored-mount-points
      - "^/(sys|proc|dev|host|etc|rootfs/var/lib/docker/containers|rootfs/var/lib/docker/overlay2|rootfs/run/docker/netns|rootfs/var/lib/docker/aufs)($$|/)"
    ports:
      - 9100:9100
    deploy:
      mode: global

  cadvisor:
    container_name: cadvisor
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    profiles: ["metrics"]
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - 5050:8080
    deploy:
      mode: global

  grafana:
    container_name: grafana
    image: grafana/grafana:11.2.3
    profiles: ["metrics"]
    user: "472"
    depends_on:
      prometheus:
        condition: service_healthy
    ports:
      - 3000:3000
    volumes:
      - ./grafana/data:/var/lib/grafana
      - ./grafana/provisioning/:/etc/grafana/provisioning/
    env_file:
      - ./grafana/.env.grafana
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
