apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "d-party.nginx.fullname" . }}
  labels:
    {{- include "d-party.labels" . | nindent 4 }}
    app.kubernetes.io/component: nginx
data:
  nginx.conf: |
    worker_processes auto;
    pid /tmp/nginx.pid;
    error_log /dev/stderr warn;

    events {
        worker_connections 1024;
    }

    http {
        server_tokens off;
        include /etc/nginx/mime.types;
        default_type application/octet-stream;
        access_log /dev/stdout combined;
        sendfile on;

        # Service の ClusterIP は安定なので upstream はサービス名で起動時解決すれば足りる
        # （Pod 再作成でも ClusterIP は不変）。動的 resolver は不要。
        upstream app_server {
            server {{ include "d-party.django.fullname" . }}:{{ .Values.django.service.port }} fail_timeout=0;
        }
        upstream frontend_server {
            server {{ include "d-party.frontend.fullname" . }}:{{ .Values.frontend.service.port }} fail_timeout=0;
        }

        server {
            listen 80 default;
            client_max_body_size 4G;
            keepalive_timeout 10;

            # nginx 自身の生死判定（upstream/ALLOWED_HOSTS に依存しない）。
            location = /healthz {
                access_log off;
                return 200 "ok\n";
            }

            location /static/ {
                alias /static/;
            }

            # ── Django (ASGI): REST API・管理画面・統計・メトリクス・WebSocket ──
            location /api/ {
                add_header Access-Control-Allow-Origin "*" always;
                add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Content-Type, Accept" always;
                if ($request_method = OPTIONS) {
                    add_header Access-Control-Allow-Origin "*" always;
                    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
                    add_header Access-Control-Allow-Headers "Content-Type, Accept" always;
                    add_header Access-Control-Max-Age 86400 always;
                    return 204;
                }
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_redirect off;
                proxy_pass http://app_server;
            }
            location /admin/ {
                try_files $uri @proxy_to_app;
            }
            location = /metrics {
                try_files $uri @proxy_to_app;
            }
            # WebSocket（同時視聴の同期）。party/ は Django、/anime-store/lobby/ はフロント。
            location /anime-store/party/ {
                try_files $uri @proxy_to_app;
            }

            # ── React フロントエンド: 公開ページ + 静的アセット ──
            location / {
                try_files $uri @proxy_to_frontend;
            }

            location @proxy_to_app {
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-Proto $scheme;
                # WebSocket は長時間無通信になり得るのでタイムアウトを延ばす。
                proxy_read_timeout 3600s;
                proxy_send_timeout 3600s;
                proxy_redirect off;
                proxy_pass http://app_server;
            }

            location @proxy_to_frontend {
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_redirect off;
                proxy_pass http://frontend_server;
            }
        }
    }
