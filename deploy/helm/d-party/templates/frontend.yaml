apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "d-party.frontend.fullname" . }}
  labels:
    {{- include "d-party.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: {{ .Values.frontend.strategy.maxSurge }}
      maxUnavailable: {{ .Values.frontend.strategy.maxUnavailable }}
  selector:
    matchLabels:
      {{- include "d-party.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        {{- include "d-party.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: frontend
    spec:
      {{- with (include "d-party.priorityClassName.app" .) }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.frontend.terminationGracePeriodSeconds }}
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
          env:
            # SSR（lobby の generateMetadata / OG 画像）が backend を叩く内部オリジン。
            # ブラウザは window.location から origin 導出するが、サーバ側は NAT ヘアピンを
            # 避けてクラスタ内 django を直接指す（docker-compose の .env.global と同役割）。
            # 未設定だと SSR が localhost/ にフォールバックし、ルーム個別の OGP が出ない。
            - name: BACKEND_INTERNAL_ORIGIN
              value: "http://{{ include "d-party.django.fullname" . }}:{{ .Values.django.service.port }}"
            {{- if .Values.config.SITE_URL }}
            # OGP/Twitter カードの絶対 URL（SSR）。client の API/WS 接続は origin 導出
            # なので未設定でも機能する。設定時のみ env.ts の SSR 既定を上書きする。
            - name: SITE_URL
              value: {{ .Values.config.SITE_URL | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "d-party.frontend.fullname" . }}
  labels:
    {{- include "d-party.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    {{- include "d-party.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: {{ .Values.frontend.service.port }}
      targetPort: http
