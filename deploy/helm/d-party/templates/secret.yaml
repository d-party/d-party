{{- if not .Values.secret.existingSecret -}}
# existingSecret 未指定時のみ chart が機微 Secret を生成する（dev 用途）。
# 本番は SealedSecrets / SOPS 等で生成した既存 Secret を secret.existingSecret に
# 渡し、平文を Git に置かないこと。
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "d-party.secretName" . }}
  labels:
    {{- include "d-party.labels" . | nindent 4 }}
type: Opaque
stringData:
  SECRET_KEY: {{ required "secret.SECRET_KEY か secret.existingSecret が必要です" .Values.secret.SECRET_KEY | quote }}
  POSTGRES_PASSWORD: {{ required "secret.POSTGRES_PASSWORD か secret.existingSecret が必要です" .Values.secret.POSTGRES_PASSWORD | quote }}
{{- end -}}
